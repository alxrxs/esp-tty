[platformio]
default_envs = esp32s3
src_dir       = main

; -------------------------------------------------------------
; Hardware target: ESP32-S3-DevKitC-1 N16R8 (16 MB flash, 8 MB PSRAM)
; -------------------------------------------------------------
[env:esp32s3]
platform  = espressif32@6.13.0
; Custom board manifest at boards/esp32-s3-devkitc-1-n16r8.json declares
; 16 MB flash + 8 MB OPI PSRAM so PlatformIO's banner reports correctly
; (the stock esp32-s3-devkitc-1 board is the N8 / no-PSRAM variant).
board     = esp32-s3-devkitc-1-n16r8
framework = espidf

board_build.partitions       = partitions.csv
board_build.cmake_extra_args =
    -DSDKCONFIG_DEFAULTS="sdkconfig.defaults"
    -DWOLFSSL_ROOT="${PROJECT_DIR}/managed_components/wolfssl__wolfssl"

build_flags   = -DBOARD_HAS_PSRAM
monitor_speed = 115200
test_filter   = embedded/*
; Pre-generates EAP-TLS cert .S files so a single `pio run` succeeds on
; first build even when files are freshly created.  See
; scripts/gen_eap_certs_asm.py for the full explanation.
extra_scripts =
    pre:scripts/clean_ds_store.py
    post:scripts/gen_eap_certs_asm.py

; -------------------------------------------------------------
; Hardware target: Waveshare ESP32-S3-Zero (4 MB flash, 2 MB QSPI PSRAM)
; -------------------------------------------------------------
[env:esp32s3_zero]
platform  = espressif32@6.13.0
; Custom board manifest at boards/esp32-s3-zero.json declares 4 MB flash +
; 2 MB embedded QSPI PSRAM (ESP32-S3FH4R2).
board     = esp32-s3-zero
framework = espidf

board_build.partitions       = partitions_zero.csv
board_build.cmake_extra_args =
    -DSDKCONFIG_DEFAULTS="sdkconfig.defaults;sdkconfig.zero.defaults"
    -DWOLFSSL_ROOT="${PROJECT_DIR}/managed_components/wolfssl__wolfssl"

; ESPTTY_BOARD_ZERO lets firmware #ifdef board-specific behaviour in future.
build_flags   =
    -DBOARD_HAS_PSRAM
    -DESPTTY_BOARD_ZERO
monitor_speed = 115200
test_filter   = embedded/*
extra_scripts =
    pre:scripts/clean_ds_store.py
    post:scripts/gen_eap_certs_asm.py

; -------------------------------------------------------------
; Debug-console: ESP32-S3-DevKitC-1 N16R8, USB-Serial-JTAG console
;
; Same as esp32s3 but with USB_DEBUG_CONSOLE_ONLY=1 and the
; sdkconfig.debug_console.defaults overlay, which:
;   - sets CONFIG_ESP_CONSOLE_USB_SERIAL_JTAG=y (log via 303a:1001)
;   - disables CONFIG_TINYUSB_CDC_ENABLED (USB-OTG not initialised)
; The SSH bridge is absent; Wi-Fi, SSH server, OTA, SCEP, mDNS intact.
; Flash with:  make flash <devname> s3debug
; -------------------------------------------------------------
[env:esp32s3_debug]
platform  = espressif32@6.13.0
board     = esp32-s3-devkitc-1-n16r8
framework = espidf

board_build.partitions       = partitions.csv
board_build.cmake_extra_args =
    -DSDKCONFIG_DEFAULTS="sdkconfig.defaults;sdkconfig.debug_console.defaults"
    -DWOLFSSL_ROOT="${PROJECT_DIR}/managed_components/wolfssl__wolfssl"

build_flags   =
    -DBOARD_HAS_PSRAM
    -DUSB_DEBUG_CONSOLE_ONLY=1
monitor_speed = 115200
test_filter   = embedded/*
extra_scripts =
    pre:scripts/clean_ds_store.py
    post:scripts/gen_eap_certs_asm.py

; -------------------------------------------------------------
; Debug-console: Waveshare ESP32-S3-Zero, USB-Serial-JTAG console
;
; Same as esp32s3_zero but with USB_DEBUG_CONSOLE_ONLY=1 and the
; sdkconfig.debug_console.defaults overlay.  On the Zero (no CH340,
; no UART0 accessible) this makes the boot log readable directly from
; the USB-C port without any external USB-UART dongle.
; Flash with:  make flash <devname> s3zero-debug
; -------------------------------------------------------------
[env:esp32s3_zero_debug]
platform  = espressif32@6.13.0
board     = esp32-s3-zero
framework = espidf

board_build.partitions       = partitions_zero.csv
board_build.cmake_extra_args =
    -DSDKCONFIG_DEFAULTS="sdkconfig.defaults;sdkconfig.zero.defaults;sdkconfig.debug_console.defaults"
    -DWOLFSSL_ROOT="${PROJECT_DIR}/managed_components/wolfssl__wolfssl"

build_flags   =
    -DBOARD_HAS_PSRAM
    -DESPTTY_BOARD_ZERO
    -DUSB_DEBUG_CONSOLE_ONLY=1
monitor_speed = 115200
test_filter   = embedded/*
extra_scripts =
    pre:scripts/clean_ds_store.py
    post:scripts/gen_eap_certs_asm.py

; -------------------------------------------------------------
; Native host tests (Linux/macOS, no hardware, no ESP-IDF)
; -------------------------------------------------------------
[env:native]
platform       = native
build_type     = debug
test_framework = unity
test_build_src = no
lib_ldf_mode   = chain+
build_flags    =
    -I test/stubs
    -I test/stubs/wolfssl   ; wolfCrypt OpenSSL-backed stubs for pubkey_auth tests
    ; mbedtls stubs live in test/stubs/mbedtls/ and are included as "mbedtls/..."
    ; The parent dir (test/stubs) is already in the include path above.
    -DRING_NATIVE=1
    -DUNIT_TEST
    -DROLLBACK_DECISION_NATIVE_TEST  ; stub esp_ota_img_states_t for rollback_decision tests
    -DCRED_STORE_NATIVE_TEST         ; in-memory NVS backend for cred_store tests
    -DSCEP_TRANSPORT_NATIVE_TEST     ; suppress extern asm() linker symbols in scep_transport.h
    -DSCEP_CA_PEM_EMBEDDED           ; suppress linker-script cert symbols (defined in test stub)
; scep_proto.c now uses mbedTLS directly (no wolfSSL PKCS#7/RSA paths)
; -lcrypto for OpenSSL-backed wolfCrypt stubs; -lmbedcrypto for scep_proto
extra_scripts  = test/scripts/native_link_openssl.py
test_filter    = native/*
; ring, bridge, pubkey_auth, etc. are in lib/ -- PlatformIO finds them automatically

; -------------------------------------------------------------
; Wokwi simulation (same binary as esp32s3, separate env for CI)
; -------------------------------------------------------------
[env:wokwi]
platform  = espressif32@6.13.0
board     = esp32-s3-devkitc-1-n16r8
framework = espidf

board_build.partitions       = partitions.csv
board_build.cmake_extra_args =
    -DSDKCONFIG_DEFAULTS="sdkconfig.defaults;sdkconfig.wokwi"
    -DWOLFSSL_ROOT="${PROJECT_DIR}/managed_components/wolfssl__wolfssl"

build_flags =
    -DBOARD_HAS_PSRAM
    -DBRIDGE_LOOPBACK=1
extra_scripts =
    pre:scripts/clean_ds_store.py
    post:scripts/gen_eap_certs_asm.py
