[platformio]
default_envs = esp32s3
src_dir       = main

; ─────────────────────────────────────────────────────────────
; Hardware target: ESP32-S3-DevKitC-1 N16R8 (16 MB flash, 8 MB PSRAM)
; ─────────────────────────────────────────────────────────────
[env:esp32s3]
platform  = espressif32
board     = esp32-s3-devkitc-1
framework = espidf

; N16R8 memory: quad-IO flash + octal PSRAM
board_build.arduino.memory_type = qio_opi
board_build.flash_mode          = qio
board_build.psram_type          = opi
board_upload.flash_size         = 16MB
board_upload.maximum_size       = 16777216

board_build.partitions       = partitions.csv
board_build.cmake_extra_args =
    -DSDKCONFIG_DEFAULTS="sdkconfig.defaults"
    -DEXTRA_COMPONENT_DIRS="${PROJECT_DIR}/managed_components/wolfssl__wolfssl"
    -DWOLFSSL_ROOT="${PROJECT_DIR}/managed_components/wolfssl__wolfssl"

build_flags   = -DBOARD_HAS_PSRAM
monitor_speed = 115200
test_filter   = embedded/*

; ─────────────────────────────────────────────────────────────
; Native host tests (Linux/macOS, no hardware, no ESP-IDF)
; ─────────────────────────────────────────────────────────────
[env:native]
platform       = native
build_type     = debug
test_framework = unity
test_build_src = no
lib_ldf_mode   = chain+
build_flags    =
    -I test/stubs
    -I test/stubs/wolfssl   ; wolfCrypt OpenSSL-backed stubs for pubkey_auth tests
    -DRING_NATIVE=1
    -DUNIT_TEST
; -lcrypto for OpenSSL SHA-256 + base64 backing the wolfCrypt stubs
extra_scripts  = test/scripts/native_link_openssl.py
test_filter    = native/*
; ring, bridge, and pubkey_auth are in lib/ — PlatformIO finds them automatically

; ─────────────────────────────────────────────────────────────
; Wokwi simulation (same binary as esp32s3, separate env for CI)
; ─────────────────────────────────────────────────────────────
[env:wokwi]
platform  = espressif32
board     = esp32-s3-devkitc-1
framework = espidf

board_build.arduino.memory_type = qio_opi
board_build.flash_mode          = qio
board_build.psram_type          = opi
board_upload.flash_size         = 16MB
board_upload.maximum_size       = 16777216

board_build.partitions       = partitions.csv
board_build.cmake_extra_args =
    -DSDKCONFIG_DEFAULTS="sdkconfig.defaults;sdkconfig.wokwi"
    -DEXTRA_COMPONENT_DIRS="${PROJECT_DIR}/managed_components/wolfssl__wolfssl"
    -DWOLFSSL_ROOT="${PROJECT_DIR}/managed_components/wolfssl__wolfssl"

build_flags =
    -DBOARD_HAS_PSRAM
    -DBRIDGE_LOOPBACK=1
