; Minimal WiFi smoke test for ESP32-S3-Zero on the newest ESP-IDF (6.0.1).
;
; Built completely standalone -- no mbedTLS, no SCEP, no TinyUSB, no SSH.
; Just esp_wifi + lwIP + a single outbound TCP socket() / connect() / close().
;
; Purpose: definitively determine whether the WiFi RX/TX crash that hits
; us on the Zero with ESP-IDF 5.5.3 is fixed in 6.0.1, without having to
; first port lib/scep_proto and friends to the mbedTLS 4.x API.
;
; Usage:
;   cd test/zero_wifi_smoke
;   pio run -e zero_smoke --target upload
;   pio device monitor   (logs via USB-Serial-JTAG, 303a:1001)

[platformio]
default_envs = zero_smoke
src_dir       = main

[env:zero_smoke]
platform  = espressif32@7.0.1
board     = esp32-s3-zero
framework = espidf

board_build.partitions       = partitions.csv
board_build.cmake_extra_args =
    -DSDKCONFIG_DEFAULTS="sdkconfig.defaults"

build_flags =
    -DBOARD_HAS_PSRAM
monitor_speed = 115200
